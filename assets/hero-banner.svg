<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 540" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B2C3B"/>
      <stop offset="1" stop-color="#08232F"/>
    </linearGradient>
    <linearGradient id="terrain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a3a4a"/>
      <stop offset=".35" stop-color="#143848"/>
      <stop offset=".65" stop-color="#0f4a58"/>
      <stop offset="1" stop-color="#0a5a6a"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00A8CC" stop-opacity=".45"/>
      <stop offset="1" stop-color="#08232F"/>
    </linearGradient>
    <linearGradient id="cyber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00E6D2"/>
      <stop offset="1" stop-color="#00A8CC"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFC247"/>
      <stop offset="1" stop-color="#00E6D2"/>
    </linearGradient>
    <radialGradient id="globeGlow" cx=".35" cy=".35" r=".75">
      <stop offset="0" stop-color="#00E6D2" stop-opacity=".55"/>
      <stop offset="1" stop-color="#08232F"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes trainMove{0%{transform:translateX(340px)}100%{transform:translateX(720px)}}
      @keyframes truckMove{0%{transform:translateX(0)}100%{transform:translateX(48px)}}
      @keyframes truckMove2{0%{transform:translateX(20px)}100%{transform:translateX(68px)}}
      @keyframes excSwing{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(10deg)}}
      @keyframes smokeRise{0%,100%{opacity:.5;transform:translateY(0)}50%{opacity:.15;transform:translateY(-14px)}}
      @keyframes shipBob{0%,100%{transform:translate(0,0)}50%{transform:translate(6px,-4px)}}
      @keyframes craneSwing{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-8deg)}}
      @keyframes shieldPulse{0%,100%{opacity:.65;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
      @keyframes dataFlow{to{stroke-dashoffset:-36}}
      @keyframes particle{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.25)}}
      @keyframes globePulse{0%,100%{opacity:.85}50%{opacity:1}}
      @keyframes satOrbit{0%{transform:rotate(0deg) translateX(72px) rotate(0deg)}100%{transform:rotate(360deg) translateX(72px) rotate(-360deg)}}
      @keyframes holo{0%,100%{opacity:.35}50%{opacity:.85}}
      @keyframes lockPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
      @keyframes scan{0%{transform:translateX(-20px);opacity:0}30%{opacity:.8}100%{transform:translateX(120px);opacity:0}}
      .anim-train{animation:trainMove 18s linear infinite}
      .anim-truck1{animation:truckMove 6s ease-in-out infinite alternate}
      .anim-truck2{animation:truckMove2 7s ease-in-out infinite alternate}
      .anim-exc{animation:excSwing 3.2s ease-in-out infinite;transform-origin:118px 318px}
      .anim-smoke{animation:smokeRise 2.8s ease-in-out infinite}
      .anim-ship{animation:shipBob 9s ease-in-out infinite}
      .anim-crane1{animation:craneSwing 5s ease-in-out infinite;transform-origin:668px 300px}
      .anim-crane2{animation:craneSwing 5.5s ease-in-out infinite .6s;transform-origin:728px 292px}
      .anim-shield{animation:shieldPulse 2.6s ease-in-out infinite}
      .anim-shield2{animation:shieldPulse 2.6s ease-in-out infinite .8s}
      .anim-shield3{animation:shieldPulse 2.6s ease-in-out infinite 1.4s}
      .anim-shield4{animation:shieldPulse 2.6s ease-in-out infinite 2s}
      .anim-net{stroke-dasharray:8 6;animation:dataFlow 2.4s linear infinite}
      .anim-net2{stroke-dasharray:6 8;animation:dataFlow 3s linear infinite reverse}
      .anim-p1{animation:particle 3s ease-in-out infinite}
      .anim-p2{animation:particle 3s ease-in-out infinite .7s}
      .anim-p3{animation:particle 3s ease-in-out infinite 1.4s}
      .anim-p4{animation:particle 3s ease-in-out infinite 2.1s}
      .anim-p5{animation:particle 3s ease-in-out infinite 2.8s}
      .anim-globe{animation:globePulse 5s ease-in-out infinite}
      .anim-sat{animation:satOrbit 24s linear infinite;transform-origin:1040px 200px}
      .anim-holo{animation:holo 2.4s ease-in-out infinite}
      .anim-lock{animation:lockPulse 2.8s ease-in-out infinite}
      .anim-scan{animation:scan 3.5s ease-in-out infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>

  <!-- Sky -->
  <rect width="1260" height="540" fill="url(#sky)"/>
  <rect y="380" width="900" height="160" fill="url(#terrain)"/>
  <path d="M880 400 L1260 420 L1260 540 L880 540 Z" fill="url(#sea)"/>

  <!-- Digital backbone -->
  <path class="anim-net" d="M60 180 Q280 120 460 160 Q640 130 820 150 Q980 120 1120 170" fill="none" stroke="#00E6D2" stroke-width="2" opacity=".55" filter="url(#glow)"/>
  <path class="anim-net2" d="M100 240 Q320 200 500 220 Q700 190 900 210 Q1050 180 1180 220" fill="none" stroke="#00A8CC" stroke-width="1.5" opacity=".4"/>

  <!-- MINE -->
  <g id="mine">
    <path d="M20 400 L20 260 L80 210 L140 230 L180 200 L240 240 L240 400 Z" fill="#1a3040" opacity=".95"/>
    <path d="M50 400 L50 320 L90 300 L130 320 L130 400 Z" fill="#243848"/>
    <path d="M80 400 L80 350 L110 335 L140 350 L140 400 Z" fill="#2e4858"/>
    <g class="anim-exc">
      <rect x="108" y="300" width="10" height="28" rx="2" fill="#FFC247"/>
      <path d="M118 300 L148 278 L148 286 L126 306 Z" fill="#aaa"/>
      <circle cx="112" cy="328" r="6" fill="#333"/>
    </g>
    <g class="anim-truck1" transform="translate(150,360)">
      <rect x="0" y="0" width="36" height="18" rx="3" fill="#00A8CC"/>
      <rect x="4" y="-8" width="20" height="10" rx="2" fill="#0B2C3B"/>
      <circle cx="10" cy="20" r="5" fill="#222"/><circle cx="28" cy="20" r="5" fill="#222"/>
      <rect x="30" y="4" width="8" height="10" rx="1" fill="#FFC247" opacity=".8"/>
    </g>
    <g class="anim-truck2" transform="translate(195,372)">
      <rect x="0" y="0" width="32" height="16" rx="3" fill="#00E6D2" opacity=".85"/>
      <circle cx="8" cy="18" r="4" fill="#222"/><circle cx="24" cy="18" r="4" fill="#222"/>
    </g>
    <circle class="anim-p1" cx="70" cy="280" r="4" fill="#00E6D2" filter="url(#glow)"/>
    <circle class="anim-p2" cx="160" cy="260" r="3" fill="#00E6D2"/>
    <rect x="62" y="248" width="10" height="7" rx="1" fill="#0B2C3B" stroke="#00E6D2" stroke-width="1"/>
    <circle cx="67" cy="251" r="2" fill="#00A8CC"/>
  </g>

  <!-- PLANT -->
  <g id="plant">
    <rect x="280" y="330" width="90" height="70" rx="3" fill="#2a4050"/>
    <rect x="300" y="290" width="50" height="40" fill="#354858"/>
    <rect x="318" y="250" width="14" height="42" fill="#4a5a68"/>
    <rect x="340" y="265" width="10" height="28" fill="#5a6a78"/>
    <circle class="anim-smoke" cx="325" cy="242" r="6" fill="#fff" opacity=".3"/>
    <circle class="anim-smoke" cx="345" cy="255" r="4" fill="#fff" opacity=".25" style="animation-delay:.8s"/>
    <rect x="370" y="310" width="60" height="50" rx="2" fill="#304858"/>
    <rect x="382" y="278" width="8" height="34" fill="#556878"/>
    <rect x="400" y="285" width="8" height="28" fill="#556878"/>
    <rect class="anim-holo" x="292" y="268" width="44" height="22" rx="2" fill="#00E6D2" opacity=".4" stroke="#00A8CC"/>
    <line x1="300" y1="276" x2="328" y2="276" stroke="#fff" stroke-width="1" opacity=".6"/>
    <line x1="300" y1="282" x2="320" y2="282" stroke="#fff" stroke-width="1" opacity=".4"/>
    <g class="anim-shield2" transform="translate(355,240)">
      <path d="M0 0 L14 3 L14 16 Q7 24 0 18 Q-7 24 -14 16 L-14 3 Z" fill="url(#gold)" opacity=".9"/>
      <rect x="-4" y="8" width="8" height="5" rx="1" fill="#fff" opacity=".85"/>
    </g>
  </g>

  <!-- RAILWAY -->
  <g id="railway">
    <line x1="420" y1="410" x2="780" y2="410" stroke="#3a4a58" stroke-width="4"/>
    <line x1="420" y1="418" x2="780" y2="418" stroke="#2a3a48" stroke-width="2"/>
    <g class="anim-train">
      <rect x="0" y="372" width="42" height="24" rx="3" fill="#00A8CC"/>
      <rect x="4" y="362" width="34" height="12" rx="2" fill="#0B2C3B"/>
      <rect x="44" y="378" width="32" height="18" rx="2" fill="#FFC247" opacity=".85"/>
      <rect x="78" y="378" width="32" height="18" rx="2" fill="#FFC247" opacity=".85"/>
      <rect x="112" y="378" width="32" height="18" rx="2" fill="#FFC247" opacity=".85"/>
      <circle cx="16" cy="398" r="6" fill="#111"/><circle cx="32" cy="398" r="6" fill="#111"/>
      <circle cx="58" cy="398" r="5" fill="#111"/><circle cx="92" cy="398" r="5" fill="#111"/><circle cx="126" cy="398" r="5" fill="#111"/>
    </g>
    <rect x="480" y="300" width="36" height="80" fill="#2a4050"/>
    <line x1="498" y1="300" x2="498" y2="240" stroke="#00E6D2" stroke-width="2"/>
    <circle cx="498" cy="236" r="4" fill="#00E6D2" class="anim-p3"/>
    <rect x="540" y="320" width="70" height="60" rx="2" fill="#304858"/>
    <rect x="552" y="300" width="20" height="22" fill="#405868"/>
  </g>

  <!-- PORT -->
  <g id="port">
    <rect x="800" y="390" width="120" height="20" fill="#3a4a58"/>
    <g class="anim-crane1">
      <rect x="664" y="300" width="6" height="90" fill="#5a6a78"/>
      <path d="M670 300 L710 280 L710 288 L678 304 Z" fill="#FFC247"/>
      <line x1="700" y1="284" x2="700" y2="340" stroke="#FFC247" stroke-width="2"/>
      <rect x="694" y="338" width="12" height="8" fill="#00A8CC"/>
    </g>
    <g class="anim-crane2">
      <rect x="724" y="292" width="6" height="98" fill="#5a6a78"/>
      <path d="M730 292 L768 276 L768 284 L736 298 Z" fill="#FFC247"/>
      <line x1="758" y1="280" x2="758" y2="332" stroke="#FFC247" stroke-width="2"/>
    </g>
    <g class="anim-ship">
      <path d="M820 400 L940 420 L940 460 L820 440 Z" fill="#8b2942"/>
      <rect x="850" y="408" width="60" height="16" fill="#a03050"/>
      <rect x="870" y="396" width="20" height="14" fill="#304858"/>
    </g>
    <rect x="830" y="372" width="14" height="12" fill="#00A8CC" opacity=".8"/>
    <rect x="848" y="372" width="14" height="12" fill="#00E6D2" opacity=".8"/>
    <rect x="866" y="372" width="14" height="12" fill="#FFC247" opacity=".8"/>
    <g class="anim-shield3" transform="translate(780,250)">
      <path d="M0 0 L14 3 L14 16 Q7 24 0 18 Q-7 24 -14 16 L-14 3 Z" fill="url(#cyber)" opacity=".85"/>
    </g>
  </g>

  <!-- SOC / monitors -->
  <g id="soc" transform="translate(560,430)">
    <rect x="0" y="0" width="80" height="48" rx="4" fill="#0B2C3B" stroke="#00A8CC" stroke-width="1"/>
    <rect x="8" y="8" width="28" height="18" rx="2" fill="#08232F" stroke="#00E6D2"/>
    <rect x="42" y="8" width="28" height="18" rx="2" fill="#08232F" stroke="#00E6D2"/>
    <rect class="anim-scan" x="10" y="12" width="24" height="2" fill="#00E6D2" opacity=".7"/>
    <circle cx="20" cy="38" r="3" fill="#00E6D2" class="anim-p4"/>
    <circle cx="40" cy="38" r="3" fill="#FFC247" class="anim-p5"/>
  </g>

  <!-- Cyber locks -->
  <g class="anim-lock" transform="translate(620,200)">
    <circle r="18" fill="none" stroke="#FFC247" stroke-width="1.5" opacity=".5"/>
    <rect x="-7" y="-2" width="14" height="11" rx="2" fill="#00A8CC"/>
    <path d="M-6 -2 V-8 Q0 -14 6 -8 V-2" fill="none" stroke="#FFC247" stroke-width="2"/>
  </g>

  <!-- More shields -->
  <g class="anim-shield" transform="translate(120,180)">
    <path d="M0 0 L14 3 L14 16 Q7 24 0 18 Q-7 24 -14 16 L-14 3 Z" fill="url(#cyber)" opacity=".9"/>
    <rect x="-4" y="8" width="8" height="5" rx="1" fill="#fff" opacity=".85"/>
  </g>
  <g class="anim-shield4" transform="translate(900,190)">
    <path d="M0 0 L14 3 L14 16 Q7 24 0 18 Q-7 24 -14 16 L-14 3 Z" fill="url(#gold)" opacity=".85"/>
  </g>

  <!-- Data particles along journey -->
  <circle class="anim-p1" cx="240" cy="190" r="5" fill="#00E6D2" filter="url(#glow)"/>
  <circle class="anim-p2" cx="420" cy="170" r="4" fill="#00E6D2"/>
  <circle class="anim-p3" cx="600" cy="185" r="5" fill="#00A8CC" filter="url(#glow)"/>
  <circle class="anim-p4" cx="760" cy="175" r="4" fill="#00E6D2"/>
  <circle class="anim-p5" cx="920" cy="195" r="5" fill="#FFC247"/>

  <!-- Security accent icons (no text) -->
  <g transform="translate(180,470)" opacity=".75">
    <circle r="14" fill="#0B2C3B" stroke="#00E6D2" stroke-width="1"/>
    <path d="M-5 2 L0 -6 L5 2 Z" fill="#FFC247"/>
  </g>
  <g transform="translate(260,478)" opacity=".75">
    <circle r="14" fill="#0B2C3B" stroke="#00A8CC" stroke-width="1"/>
    <rect x="-6" y="-4" width="12" height="8" rx="1" fill="#00E6D2"/>
    <path d="M-4 -4 V-8 Q0 -12 4 -8 V-4" fill="none" stroke="#FFC247" stroke-width="1.5"/>
  </g>
  <g transform="translate(340,470)" opacity=".75">
    <circle r="14" fill="#0B2C3B" stroke="#00E6D2" stroke-width="1"/>
    <ellipse rx="5" ry="7" fill="none" stroke="#FFC247" stroke-width="1.5"/>
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#00E6D2" stroke-width="1"/>
  </g>
  <g transform="translate(420,478)" opacity=".75">
    <circle r="14" fill="#0B2C3B" stroke="#00A8CC" stroke-width="1"/>
    <path d="M-6 4 Q0 -6 6 4" fill="none" stroke="#00E6D2" stroke-width="1.5"/>
    <ellipse cx="0" cy="2" rx="6" ry="3" fill="none" stroke="#FFC247" stroke-width="1"/>
  </g>

  <!-- GLOBE + SATELLITES -->
  <g class="anim-globe" transform="translate(1040,200)">
    <circle r="88" fill="url(#globeGlow)" stroke="#00E6D2" stroke-width="2" opacity=".92"/>
    <ellipse rx="88" ry="26" fill="none" stroke="#00A8CC" stroke-width="1" opacity=".45"/>
    <ellipse rx="26" ry="88" fill="none" stroke="#00A8CC" stroke-width="1" opacity=".45"/>
    <path d="M-58 -18 Q-18 14 32 8 Q58 -6 48 -36 Q18 -52 -28 -42 Z" fill="#1a6b50" opacity=".7"/>
    <path d="M-38 28 Q-8 48 32 36 Q52 22 32 4 Q8 -10 -30 2 Z" fill="#1a6b50" opacity=".6"/>
    <path d="M10 -50 Q40 -30 58 0 Q42 20 20 8 Q0 -8 -10 -32 Z" fill="#1a6b50" opacity=".55"/>
    <circle class="anim-p1" cx="-42" cy="-24" r="5" fill="#FFC247"/>
    <circle class="anim-p2" cx="32" cy="18" r="5" fill="#FFC247"/>
    <circle class="anim-p3" cx="52" cy="-30" r="5" fill="#00E6D2"/>
    <path d="M-70 -10 Q-20 30 50 20" fill="none" stroke="#00E6D2" stroke-width="1.5" opacity=".5" class="anim-net"/>
    <path d="M-50 40 Q10 70 80 30" fill="none" stroke="#FFC247" stroke-width="1" opacity=".4" class="anim-net2"/>
  </g>
  <g class="anim-sat">
    <rect x="-6" y="-4" width="12" height="8" rx="1" fill="#00A8CC"/>
    <line x1="-10" y1="0" x2="-6" y2="0" stroke="#00E6D2" stroke-width="1"/>
    <line x1="6" y1="0" x2="10" y2="0" stroke="#00E6D2" stroke-width="1"/>
    <circle r="2" fill="#FFC247"/>
  </g>
  <g class="anim-sat" style="animation-duration:32s;animation-delay:-8s">
    <rect x="-5" y="-3" width="10" height="6" rx="1" fill="#00E6D2" opacity=".8"/>
    <circle r="1.5" fill="#fff"/>
  </g>

  <!-- Foreground glow accents -->
  <rect x="0" y="500" width="1260" height="40" fill="#08232F" opacity=".35"/>
</svg>
