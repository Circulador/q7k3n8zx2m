<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 956 96" width="956" height="96" aria-hidden="true">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0a4a52"/><stop offset="1" stop-color="#063540"/></linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#5c3d1e"/><stop offset=".4" stop-color="#3d6b35"/><stop offset=".75" stop-color="#1a6b78"/><stop offset="1" stop-color="#0e5f6e"/></linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1a8fa8"/><stop offset="1" stop-color="#0a4a58"/></linearGradient>
    <linearGradient id="cyber" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#00D4FF"/><stop offset="1" stop-color="#007E7A"/></linearGradient>
    <linearGradient id="orbita" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#EDB111"/><stop offset="1" stop-color="#007E7A"/></linearGradient>
    <radialGradient id="globeGlow" cx=".35" cy=".35" r=".7"><stop offset="0" stop-color="#2ec4d8"/><stop offset="1" stop-color="#0a4a58"/></radialGradient>
    <style>
      @keyframes train{0%{transform:translate(392px,0)}100%{transform:translate(636px,0)}}
      @keyframes belt{to{stroke-dashoffset:-16}}
      @keyframes ship{0%,100%{transform:translate(0,0)}50%{transform:translate(6px,-2px)}}
      @keyframes crane{0%,100%{transform:rotate(0)}50%{transform:rotate(-6deg)}}
      @keyframes shield{0%,100%{opacity:.65;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
      @keyframes net{to{stroke-dashoffset:-16}}
      @keyframes exc{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(8deg)}}
      @keyframes smoke{0%,100%{opacity:.4}50%{opacity:.12}}
      @keyframes flow{0%,100%{opacity:.2;transform:scale(.75)}50%{opacity:1;transform:scale(1.2)}}
      @keyframes lock{0%,100%{opacity:.5}50%{opacity:1}}
      @keyframes ore{0%{transform:translateX(0);opacity:0}8%{opacity:1}92%{opacity:1}100%{transform:translateX(760px);opacity:0}}
      @keyframes globe{0%,100%{opacity:.88}50%{opacity:1}}
      .t-train{animation:train 15s linear infinite}
      .t-belt{animation:belt 1.1s linear infinite}
      .t-ship{animation:ship 9s ease-in-out infinite}
      .t-crane{animation:crane 4.2s ease-in-out infinite;transform-origin:672px 50px}
      .t-sh1{animation:shield 2.3s ease-in-out infinite}
      .t-sh2{animation:shield 2.3s ease-in-out infinite .55s}
      .t-sh3{animation:shield 2.3s ease-in-out infinite 1.1s}
      .t-sh4{animation:shield 2.3s ease-in-out infinite 1.65s}
      .t-net{stroke-dasharray:4 4;animation:net 2.2s linear infinite}
      .t-exc{animation:exc 2.6s ease-in-out infinite;transform-origin:68px 54px}
      .t-smoke{animation:smoke 2.2s ease-in-out infinite}
      .t-flow{animation:flow 2.8s ease-in-out infinite}
      .t-lock{animation:lock 2.5s ease-in-out infinite}
      .t-ore{animation:ore 4.8s linear infinite}
      .t-ore2{animation:ore 4.8s linear infinite 1.6s}
      .t-globe{animation:globe 4.5s ease-in-out infinite}
      @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="956" height="96" fill="url(#sky)"/>
  <text class="hero-caption" x="478" y="11" text-anchor="middle" fill="#EDB111" font-size="9.5" font-weight="700" font-family="Segoe UI,system-ui,sans-serif">Extraction ’ Processing ’ Logistics ’ Global markets</text>
  <text class="hero-caption" x="478" y="21" text-anchor="middle" fill="#8ec8d0" font-size="8" font-family="Segoe UI,system-ui,sans-serif">Essential resources protected by cyber decisions</text>

  <rect y="58" width="678" height="38" fill="url(#ground)"/>
  <rect x="678" y="62" width="278" height="34" fill="url(#sea)"/>

  <path class="t-net" d="M94 36 Q220 26 360 34 Q500 28 620 32 Q740 26 862 34" fill="none" stroke="#00D4FF" stroke-width="1.2" opacity=".5"/>
  <path class="t-net" d="M88 42 Q300 38 478 40 Q660 36 868 42" fill="none" stroke="#007E7A" stroke-width="1" opacity=".35" style="animation-duration:2.8s"/>

  <path d="M19 58 L19 40 L51 30 L83 38 L104 30 L136 38 L136 58 Z" fill="#5a3a22" opacity=".95"/>
  <path d="M34 58 L34 48 L53 42 L72 48 L72 58 Z" fill="#6b4a2a"/>
  <path d="M46 58 L46 52 L58 47 L70 52 L70 58 Z" fill="#7a5a32"/>
  <g class="t-exc"><rect x="57" y="44" width="4" height="10" fill="#EDB111"/><path d="M61 44 L74 38 L74 41 L64 47 Z" fill="#aaa"/></g>
  <g class="t-sh1" transform="translate(92,32)"><path d="M0 0 L8 1.5 L8 8 Q4 12 0 9.5 Q-4 12 -8 8 L-8 1.5 Z" fill="url(#cyber)" opacity=".88"/><rect x="-2.5" y="4" width="5" height="3" rx=".5" fill="#fff" opacity=".9"/></g>

  <rect x="163" y="50" width="38" height="14" rx="1" fill="#6a6a6a"/>
  <rect x="166" y="42" width="22" height="8" fill="#555"/>
  <rect x="172" y="36" width="5" height="8" fill="#888"/>
  <circle cx="175" cy="33" r="2.5" fill="#bbb" class="t-smoke"/>
  <line x1="200" y1="56" x2="258" y2="56" stroke="#555" stroke-width="3"/>
  <line x1="200" y1="56" x2="258" y2="56" stroke="#EDB111" stroke-width="1.5" stroke-dasharray="5 3" class="t-belt"/>

  <ellipse cx="288" cy="58" rx="18" ry="4" fill="#8b6914" opacity=".75"/>
  <rect x="310" y="46" width="42" height="20" fill="#5a6a72"/>
  <rect x="320" y="38" width="7" height="10" fill="#888"/><rect x="336" y="41" width="7" height="7" fill="#888"/>
  <g class="t-sh2" transform="translate(340,30)"><path d="M0 0 L8 1.5 L8 8 Q4 12 0 9.5 Q-4 12 -8 8 L-8 1.5 Z" fill="url(#orbita)" opacity=".85"/></g>

  <line x1="390" y1="62" x2="638" y2="62" stroke="#444" stroke-width="2"/>
  <g class="t-train">
    <rect x="0" y="50" width="22" height="12" rx="2" fill="#007E7A"/>
    <rect x="2" y="46" width="18" height="5" fill="#005f5c"/>
    <rect x="24" y="52" width="16" height="10" rx="1" fill="#6b5030"/>
    <rect x="42" y="52" width="16" height="10" rx="1" fill="#6b5030"/>
    <rect x="60" y="52" width="16" height="10" rx="1" fill="#6b5030"/>
    <circle cx="9" cy="64" r="2.5" fill="#222"/><circle cx="18" cy="64" r="2.5" fill="#222"/>
    <circle cx="32" cy="64" r="2" fill="#222"/><circle cx="50" cy="64" r="2" fill="#222"/><circle cx="68" cy="64" r="2" fill="#222"/>
  </g>

  <rect x="648" y="56" width="54" height="6" fill="#555"/>
  <g class="t-crane"><rect x="666" y="44" width="3" height="12" fill="#888"/><path d="M669 44 L686 40 L686 43 L672 46 Z" fill="#EDB111"/></g>
  <g class="t-ship"><path d="M708 58 L776 62 L776 74 L708 70 Z" fill="#8b2942"/><rect x="726" y="62" width="36" height="6" fill="#a03050"/></g>
  <g class="t-sh3" transform="translate(700,30)"><path d="M0 0 L8 1.5 L8 8 Q4 12 0 9.5 Q-4 12 -8 8 L-8 1.5 Z" fill="url(#cyber)" opacity=".85"/></g>

  <g class="t-globe" transform="translate(868,48)">
    <circle r="30" fill="url(#globeGlow)" stroke="#EDB111" stroke-width="1.2" opacity=".92"/>
    <ellipse rx="30" ry="9" fill="none" stroke="#4ec8d8" stroke-width=".7" opacity=".5"/>
    <ellipse rx="9" ry="30" fill="none" stroke="#4ec8d8" stroke-width=".7" opacity=".5"/>
    <path d="M-21 -6 Q-6 5 14 2 Q24 -3 21 -14 Q8 -21 -9 -15 Z" fill="#2a8a5a" opacity=".65"/>
    <path d="M-14 9 Q2 17 17 11 Q23 4 14 -1 Q3 -6 -11 0 Z" fill="#2a8a5a" opacity=".55"/>
    <circle class="t-flow" cx="-17" cy="-9" r="2.5" fill="#EDB111"/>
    <circle class="t-flow" cx="12" cy="6" r="2.5" fill="#EDB111" style="animation-delay:.7s"/>
    <circle class="t-flow" cx="21" cy="-12" r="2.5" fill="#EDB111" style="animation-delay:1.4s"/>
  </g>
  <g class="t-sh4" transform="translate(868,24)"><path d="M0 0 L8 1.5 L8 8 Q4 12 0 9.5 Q-4 12 -8 8 L-8 1.5 Z" fill="url(#orbita)" opacity=".85"/></g>

  <circle class="t-flow" cx="128" cy="44" r="2.5" fill="#00ffe1"/>
  <circle class="t-flow" cx="300" cy="40" r="2.5" fill="#00ffe1" style="animation-delay:.8s"/>
  <circle class="t-flow" cx="510" cy="46" r="2.5" fill="#00ffe1" style="animation-delay:1.6s"/>
  <circle class="t-flow" cx="720" cy="42" r="2.5" fill="#00ffe1" style="animation-delay:2.4s"/>
  <circle class="t-ore" cx="120" cy="54" r="2" fill="#B35C1E"/>
  <circle class="t-ore2" cx="120" cy="54" r="1.5" fill="#00D4FF"/>

  <g class="t-lock" transform="translate(478,50)">
    <circle r="10" fill="none" stroke="#EDB111" stroke-width=".9" opacity=".45"/>
    <rect x="-4" y="-1" width="8" height="6" rx="1" fill="#007E7A"/>
    <path d="M-3.5 -1 V-4 Q0 -7 3.5 -4 V-1" fill="none" stroke="#EDB111" stroke-width="1.2"/>
  </g>
</svg>
