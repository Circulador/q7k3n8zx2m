<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco de Perguntas — Guardião Digital Vale</title>
<link rel="stylesheet" href="css/styles.css?v=36">
<style>
body{background:#0a1a22;color:#eaf2f6;padding:16px;font-family:Segoe UI,sans-serif}
.review-wrap{max-width:1100px;margin:0 auto}
.review-head{margin-bottom:16px}
.review-head h1{margin:0 0 6px;font-size:1.35rem}
.review-head p{margin:0;color:#8aa4ad;font-size:.9rem}
.review-filters{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;align-items:center}
.review-filters input,.review-filters select{padding:8px 10px;border-radius:8px;border:1px solid #2a4a55;background:#122830;color:inherit;font:inherit}
.review-lang-group{display:flex;flex-wrap:wrap;gap:4px;padding:4px;border:1px solid #2a4a55;border-radius:10px;background:#122830}
.review-lang-group label{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:.85rem;user-select:none}
.review-lang-group input{accent-color:#007e7a}
.review-lang-group label:has(input:checked){background:rgba(0,126,122,.25);font-weight:700}
.review-card{margin-bottom:12px;padding:14px;border:1px solid #2a4a55;border-radius:12px;background:#122830}
.review-card h3{margin:0 0 6px;font-size:1rem;line-height:1.35}
.review-meta{font-size:.75rem;color:#8aa4ad;margin-bottom:8px}
.review-q{font-weight:600;margin:8px 0;line-height:1.4}
.review-opt{margin:4px 0;font-size:.88rem;line-height:1.35}
.review-opt.ok{color:#2fbf71;font-weight:700}
.review-personal{font-size:.82rem;color:#ecb11f;margin:8px 0;padding:8px;background:rgba(236,177,31,.08);border-radius:8px}
.review-why,.review-impact-bad,.review-bridge{font-size:.82rem;color:#b8c9d0;margin-top:8px;padding:8px;border-radius:8px}
.review-why{background:rgba(47,191,113,.06)}
.review-impact-bad{background:rgba(220,80,80,.08)}
.review-bridge{background:rgba(100,160,220,.08)}
.review-tag{display:inline-block;font-size:.65rem;font-weight:800;padding:2px 6px;border-radius:4px;background:rgba(0,126,122,.25);margin-right:4px}
.review-bilingual{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.review-col{padding:6px 8px;border-radius:6px;line-height:1.4}
.review-col.pt{border-left:3px solid #007e7a;background:rgba(0,126,122,.06)}
.review-col.en{border-left:3px solid #ecb11f;background:rgba(236,177,31,.06)}
.review-lang-tag{font-size:.65rem;font-weight:800;opacity:.7;margin-right:4px}
.review-opt-row .review-col{font-size:.85rem}
#reviewCount{font-size:.85rem;color:#8aa4ad}
.review-back{display:inline-block;margin-bottom:12px;color:#2fbf71;text-decoration:none;font-size:.9rem}
.review-back:hover{text-decoration:underline}
@media(max-width:720px){
  .review-bilingual{grid-template-columns:1fr}
  .review-lang-group{width:100%}
}
</style>
</head>
<body>
<div class="review-wrap">
  <a class="review-back" href="index.html">← Voltar ao jogo</a>
  <div class="review-head">
    <h1>📋 Banco de Perguntas — Revisão Pedagógica</h1>
    <p>Todas as perguntas e respostas do jogo: campanhas/diárias, cadeia Carajás e chefões tabletop.</p>
    <div class="review-filters">
      <div class="review-lang-group" role="group" aria-label="Idioma">
        <label><input type="radio" name="reviewLang" value="pt"> 🇧🇷 Português</label>
        <label><input type="radio" name="reviewLang" value="en"> 🇺🇸 English</label>
        <label><input type="radio" name="reviewLang" value="both" checked> PT + EN lado a lado</label>
      </div>
      <select id="reviewSource" aria-label="Fonte">
        <option value="all">Todas as fontes</option>
        <option value="bank">Campanhas / Diárias</option>
        <option value="chain">Cadeia Carajás</option>
        <option value="boss">Chefões (tabletop)</option>
      </select>
      <select id="reviewTheme" aria-label="Tema"><option value="">Todos os temas</option></select>
      <select id="reviewDiff" aria-label="Dificuldade"><option value="">Todas as dificuldades</option></select>
      <input type="search" id="reviewSearch" placeholder="Buscar texto…" aria-label="Buscar">
    </div>
    <p id="reviewCount" class="muted"></p>
  </div>
  <div id="reviewList" class="review-list"></div>
</div>
<script src="js/questions-data.js?v=36"></script>
<script src="js/country-questions-data.js?v=36"></script>
<script src="js/chain-data.js?v=36"></script>
<script src="js/bosses-data.js?v=36"></script>
<script src="js/review-bank.js?v=36"></script>
</body>
</html>
